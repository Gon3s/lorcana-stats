<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="l-bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1c1f38"/>
      <stop offset="1" stop-color="#0a0b14"/>
    </linearGradient>
    <linearGradient id="l-drop" x1="80" y1="22" x2="80" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b07cc6"/>
      <stop offset="1" stop-color="#5b1a8a"/>
    </linearGradient>
    <linearGradient id="l-gold" x1="64" y1="62" x2="96" y2="94" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0cc6e"/>
      <stop offset="1" stop-color="#9b6e14"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect width="160" height="160" rx="28" fill="url(#l-bg)"/>
  <!-- Bordure or externe -->
  <rect x="1.5" y="1.5" width="157" height="157" rx="26.5" stroke="#c9a84c" stroke-width="1.5" stroke-opacity=".6"/>
  <!-- Bordure interne subtile -->
  <rect x="6" y="6" width="148" height="148" rx="22" stroke="#c9a84c" stroke-width=".8" stroke-opacity=".12"/>

  <!-- Goutte d'encre (teardrop : pointu en haut, rond en bas) -->
  <path d="M80 22 C80 22 112 58 112 88 C112 108 97.5 122 80 122 C62.5 122 48 108 48 88 C48 58 80 22 80 22 Z"
        fill="url(#l-drop)"/>
  <!-- Contour de la goutte -->
  <path d="M80 22 C80 22 112 58 112 88 C112 108 97.5 122 80 122 C62.5 122 48 108 48 88 C48 58 80 22 80 22 Z"
        stroke="rgba(176,124,198,.45)" stroke-width="1.5"/>
  <!-- Reflet sur la goutte (coin haut-gauche) -->
  <path d="M68 46 C70 38 75 30 80 24 C74 32 69 42 67 54 Z" fill="rgba(240,204,110,.3)"/>

  <!-- Étoile 4 branches au centre -->
  <path d="M80 62 L83.5 74.5 L96 78 L83.5 81.5 L80 94 L76.5 81.5 L64 78 L76.5 74.5 Z"
        fill="url(#l-gold)"/>

  <!-- Petites étincelles décoratives -->
  <!-- Haut-gauche : croix -->
  <g stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" opacity=".65">
    <line x1="28" y1="26.5" x2="28" y2="37.5"/>
    <line x1="22.5" y1="32"  x2="33.5" y2="32"/>
  </g>
  <circle cx="28" cy="32" r="1.5" fill="#c9a84c" opacity=".65"/>

  <!-- Bas-droite : croix amethyst -->
  <g stroke="#9b59b6" stroke-width="1.2" stroke-linecap="round" opacity=".55">
    <line x1="130" y1="125.5" x2="130" y2="134.5"/>
    <line x1="125.5" y1="130" x2="134.5" y2="130"/>
  </g>
  <circle cx="130" cy="130" r="1.5" fill="#9b59b6" opacity=".55"/>

  <!-- Points discrets -->
  <circle cx="132" cy="30"  r="1"   fill="#c9a84c" opacity=".45"/>
  <circle cx="30"  cy="128" r="1"   fill="#c9a84c" opacity=".4"/>
  <circle cx="120" cy="56"  r="1.2" fill="#c9a84c" opacity=".35"/>
  <circle cx="40"  cy="92"  r="1"   fill="#9b59b6" opacity=".45"/>
</svg>
