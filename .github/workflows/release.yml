name: 🔖 Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        description: "Version to release (ex: 1.2.0)"
  pull_request:
    types:
      - closed

jobs:
  release_workflow:
    runs-on: ubuntu-latest
    steps:
      - name: gitflow-workflow-action release workflows
        uses: hoangvvo/gitflow-workflow-action@0.3.8
        with:
          develop_branch: "develop"
          main_branch: "main"
          merge_back_from_main: false
          # inputs.version est vide sur le trigger pull_request (géré par l'action)
          version: ${{ inputs.version || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
