name: 🚀 Deploy — GitHub Pages (Production)

# Gitflow : seul main déclenche le déploiement en production
on:
  push:
    branches:
      - main

  # Déclenchement manuel depuis l'onglet Actions (ex: hotfix urgent)
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

# Un seul déploiement à la fois ; annule celui en cours si un nouveau push arrive
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: 📦 Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Configurer GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 📂 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Déployer
        id: deployment
        uses: actions/deploy-pages@v4
