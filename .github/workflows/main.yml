name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Permet de déclencher manuellement depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois, annule celui en cours si un nouveau push arrive
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout du repo
        uses: actions/checkout@v4

      - name: ⚙️ Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Uploader les fichiers statiques
        uses: actions/upload-pages-artifact@v3
        with:
          # Tout le contenu du repo est déployé
          path: '.'

      - name: 🚀 Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
